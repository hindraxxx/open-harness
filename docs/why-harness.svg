<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 870" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Why the Workflow Harness beats a plain AGENTS.md">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="rightHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <!-- clips so header bands round only their TOP corners, matching the panel -->
    <clipPath id="clipLeft"><rect x="60" y="130" width="510" height="400" rx="18"/></clipPath>
    <clipPath id="clipRight"><rect x="630" y="130" width="510" height="400" rx="18"/></clipPath>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="870" rx="24" fill="url(#bg)"/>

  <!-- header -->
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-size="40" font-weight="700">Workflow Harness vs. a Plain AGENTS.md</text>
  <text x="600" y="98" text-anchor="middle" fill="#94a3b8" font-size="19">Same agent. Same repo. One of them actually enforces the workflow.</text>

  <!-- ============ LEFT: Plain AGENTS.md ============ -->
  <g filter="url(#shadow)">
    <rect x="60" y="130" width="510" height="400" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  </g>
  <g clip-path="url(#clipLeft)">
    <rect x="60" y="130" width="510" height="66" fill="#3f1d24"/>
  </g>
  <text x="92" y="164" fill="#fca5a5" font-size="22" font-weight="700">📄 Plain AGENTS.md</text>
  <text x="92" y="184" fill="#f0a0a0" font-size="13.5" opacity="0.85">Instructions you hope the agent remembers</text>

  <g fill="#e2e8f0" font-size="16.5">
    <g transform="translate(92,238)"><text fill="#ef4444" font-size="19" font-weight="700">✕</text><text x="32" y="1">Rules are prose — nothing enforces them</text></g>
    <g transform="translate(92,276)"><text fill="#ef4444" font-size="19" font-weight="700">✕</text><text x="32" y="1">No state: every message starts from zero</text></g>
    <g transform="translate(92,314)"><text fill="#ef4444" font-size="19" font-weight="700">✕</text><text x="32" y="1">Edits code before there is even a plan</text></g>
    <g transform="translate(92,352)"><text fill="#ef4444" font-size="19" font-weight="700">✕</text><text x="32" y="1">No approval gates between phases</text></g>
    <g transform="translate(92,390)"><text fill="#ef4444" font-size="19" font-weight="700">✕</text><text x="32" y="1">Plan review happens in scattered chat</text></g>
    <g transform="translate(92,428)"><text fill="#ef4444" font-size="19" font-weight="700">✕</text><text x="32" y="1">One agent does every job with one lens</text></g>
    <g transform="translate(92,466)"><text fill="#ef4444" font-size="19" font-weight="700">✕</text><text x="32" y="1">No proof or audit trail of what happened</text></g>
  </g>
  <text x="92" y="510" fill="#94a3b8" font-size="14.5" font-style="italic">Result: good intentions, inconsistent outcomes.</text>

  <!-- ============ RIGHT: Workflow Harness ============ -->
  <g filter="url(#shadow)">
    <rect x="630" y="130" width="510" height="400" rx="18" fill="#0b2b28" stroke="#1f7a5c" stroke-width="1.5"/>
  </g>
  <g clip-path="url(#clipRight)">
    <rect x="630" y="130" width="510" height="66" fill="url(#rightHead)"/>
  </g>
  <text x="662" y="164" fill="#ecfdf5" font-size="22" font-weight="700">🛡️ Workflow Harness</text>
  <text x="662" y="184" fill="#d1fae5" font-size="13.5" opacity="0.95">Guardrails the CLI checks on every step</text>

  <g fill="#e2f7ef" font-size="16.5">
    <g transform="translate(662,238)"><text fill="#34d399" font-size="19" font-weight="700">✓</text><text x="32" y="1">SQLite-canonical state machine per session</text></g>
    <g transform="translate(662,276)"><text fill="#34d399" font-size="19" font-weight="700">✓</text><text x="32" y="1">Resumable: <tspan font-family="monospace" fill="#7dd3fc">harness status</tspan> restores context</text></g>
    <g transform="translate(662,314)"><text fill="#34d399" font-size="19" font-weight="700">✓</text><text x="32" y="1">Edit gate: code only in implementation/fix</text></g>
    <g transform="translate(662,352)"><text fill="#34d399" font-size="19" font-weight="700">✓</text><text x="32" y="1">Human approval gates between phases</text></g>
    <g transform="translate(662,390)"><text fill="#fbbf24" font-size="19" font-weight="700">✓</text><text x="32" y="1"><tspan fill="#fde68a" font-weight="600">Inline plan annotations</tspan> — you comment, agent applies</text></g>
    <g transform="translate(662,428)"><text fill="#fbbf24" font-size="19" font-weight="700">✓</text><text x="32" y="1"><tspan fill="#fde68a" font-weight="600">A specialized sub-agent</tspan> drives each phase</text></g>
    <g transform="translate(662,466)"><text fill="#34d399" font-size="19" font-weight="700">✓</text><text x="32" y="1">Proof files + full transition history</text></g>
  </g>
  <text x="662" y="510" fill="#86efac" font-size="14.5" font-style="italic">Result: the same disciplined flow, every time.</text>

  <!-- ============ FEATURE CALLOUTS ============ -->
  <!-- Inline annotation review -->
  <rect x="60" y="560" width="525" height="118" rx="14" fill="#172033" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="86" y="596" fill="#fde68a" font-size="19" font-weight="700">🖊  Inline annotation review</text>
  <text x="86" y="624" fill="#cbd5e1" font-size="14.5">A passing planning validation opens the rendered plan in your</text>
  <text x="86" y="645" fill="#cbd5e1" font-size="14.5">browser. Select text, leave comments — the agent reads them via</text>
  <text x="86" y="666" fill="#cbd5e1" font-size="14.5"><tspan font-family="monospace" fill="#7dd3fc">harness annotations</tspan> and edits the plan in the same session.</text>

  <!-- Sub-agent per step -->
  <rect x="615" y="560" width="525" height="118" rx="14" fill="#172033" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="641" y="596" fill="#a7f3d0" font-size="19" font-weight="700">🤖  A sub-agent for each step</text>
  <text x="641" y="624" fill="#cbd5e1" font-size="14.5">Exploration, implementation, and review are delegated to</text>
  <text x="641" y="645" fill="#cbd5e1" font-size="14.5">purpose-built sub-agents, so every phase runs with the right</text>
  <text x="641" y="666" fill="#cbd5e1" font-size="14.5">tools and the right lens instead of one agent doing it all.</text>

  <!-- ============ pipeline strip with per-step sub-agents ============ -->
  <text x="600" y="726" text-anchor="middle" fill="#cbd5e1" font-size="15" letter-spacing="0.5">A guarded pipeline — with the right sub-agent on each step:</text>
  <g font-size="14" font-weight="600" text-anchor="middle">
    <g transform="translate(150,748)"><rect x="-72" y="0" width="144" height="42" rx="10" fill="#334155"/><text x="0" y="26" fill="#e2e8f0">planning</text><text x="0" y="60" fill="#93c5fd" font-size="12.5" font-weight="500">🔎 code-explorer</text></g>
    <g transform="translate(345,748)"><rect x="-80" y="0" width="160" height="42" rx="10" fill="#1e40af"/><text x="0" y="26" fill="#dbeafe">implementation</text><text x="0" y="60" fill="#93c5fd" font-size="12.5" font-weight="500">🛠 implementer</text></g>
    <g transform="translate(540,748)"><rect x="-60" y="0" width="120" height="42" rx="10" fill="#6d28d9"/><text x="0" y="26" fill="#ede9fe">review</text><text x="0" y="60" fill="#93c5fd" font-size="12.5" font-weight="500">🔍 code-reviewer</text></g>
    <g transform="translate(742,748)"><rect x="-82" y="0" width="164" height="42" rx="10" fill="#b45309"/><text x="0" y="26" fill="#fef3c7">quality-check</text><text x="0" y="60" fill="#93c5fd" font-size="12.5" font-weight="500">✅ implementer</text></g>
    <g transform="translate(940,748)"><rect x="-66" y="0" width="132" height="42" rx="10" fill="#0e7490"/><text x="0" y="26" fill="#cffafe">approval</text><text x="0" y="60" fill="#cbd5e1" font-size="12.5" font-weight="500">👤 human</text></g>
    <g transform="translate(1082,748)"><rect x="-50" y="0" width="100" height="42" rx="10" fill="#047857"/><text x="0" y="26" fill="#d1fae5">done</text><text x="0" y="60" fill="#cbd5e1" font-size="12.5" font-weight="500">🎉 shipped</text></g>
  </g>
  <g stroke="#64748b" stroke-width="2" fill="none">
    <path d="M222 769 H262"/><path d="M425 769 H476"/><path d="M600 769 H673"/><path d="M824 769 H867"/><path d="M1006 769 H1030"/>
  </g>
  <g fill="#64748b">
    <path d="M262 769 l-9 -5 v10 z"/><path d="M476 769 l-9 -5 v10 z"/><path d="M673 769 l-9 -5 v10 z"/><path d="M867 769 l-9 -5 v10 z"/><path d="M1030 769 l-9 -5 v10 z"/>
  </g>
</svg>
